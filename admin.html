<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Administration Console</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚖</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1e40af;
            --success: #059669;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --error: #dc2626;
            --limbo-bg: #fff1f2;
            --limbo-border: #fecdd3;
            --limbo-text: #9f1239;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 950px; margin: 0 auto; }
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2, h3 { margin-top: 0; color: #0f172a; }
        .diagnostic-box {
            background-color: #f1f5f9;
            border: 2px dashed #94a3b8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .status-good { color: var(--success); font-weight: bold; }
        .status-bad { color: var(--error); font-weight: bold; background: #fee2e2; padding: 10px; border-radius: 6px; }
        .date-badge {
            display: inline-block;
            background-color: #eff6ff;
            color: #1e40af;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .area-header {
            background: #1e3a8a;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            margin-top: 35px;
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .vehicle-block {
            background: var(--card);
            border: 1px solid #cbd5e1;
            border-left: 6px solid var(--success);
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 4px 12px 12px 4px;
        }
        .limbo-block {
            background: var(--limbo-bg);
            border: 2px dashed var(--limbo-border);
            padding: 24px;
            border-radius: 12px;
            margin-top: 35px;
            margin-bottom: 30px;
            color: var(--limbo-text);
        }
        .vehicle-title {
            color: #065f46;
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 6px;
            font-weight: bold;
        }
        .stop-summary-inline {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #475569;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; color: #334155; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        .delete-btn {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .refresh-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="diagnostic-box">
        <strong>⚙️ Admin Database Diagnostic Monitor:</strong>
        <div id="diagnosticStatus" class="status-good">Connecting...</div>
    </div>

    <div class="card">
        <h2>🚖 Sunday Compiled Taxi Rosters</h2>
        <div class="date-badge">Rosters For: <span class="targetSundayDate"></span></div>
        <p style="margin-bottom: 20px;">Total Master Database Count: <strong id="totalCount" style="color:var(--primary); font-size:1.2rem;">0</strong></p>
        
        <button class="refresh-btn" onclick="fetchAndCompileLogistics()">🔄 Refresh Live Data From Cloud</button>
        <button class="refresh-btn" style="background: #475569;" onclick="downloadExcelBackup()">📊 Download Excel Report</button>
        
        <div id="manifestContainer" style="margin-top: 20px;"></div>
    </div>

    <div id="limboSectionContainer"></div>

</div>

<script>
    const SUPABASE_URL = "https://btdghwdrbkernrufmnsl.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_P4t4Ogqjz4KCAf7Rvt9ctg_kgw5USx-";
    const ADMIN_PASSWORD = "Church2026"; 
    const TAXI_CAPACITY = 17;
    const MIN_PASSENGER_FLOOR = 14;

    const REGIONAL_ROUTES = {
        "Braam Route": ["56 Jorissen", "Amani", "Amic Deck", "Apex", "Student Digzz", "YMCA"],
        "Auckland Park Route": ["APK McDonald’s", "Gate 2", "Gate 4", "Laborie", "Richmond", "UJ Bunting", "Westdene Engen"],
        "CBD Route": ["DFC Bus Stop", "Focus 2", "Gateway", "Ghandi Square", "Maboneng", "Saratoga", "Shell Mooi Street", "Urban Circle", "The Fields", "Focus 1"],
        "Parktown Route": ["Campus Central Empire", "Argyle", "Junction", "Arteria", "Education Campus", "Charlotte Maxeke", "EOH", "Knockando", "Yale", "Stanley Avenue"]
    };

    let churchDb = null;
    const diagnostic = document.getElementById('diagnosticStatus');

    function initializeAdmin() {
        try {
            churchDb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            diagnostic.innerHTML = "✅ Secure driver connected. Fetching live cloud rows...";
            fetchAndCompileLogistics();
            calculateUpcomingSunday();
        } catch(err) {
            diagnostic.className = "status-bad";
            diagnostic.innerHTML = "🚨 Connection Error: " + err.message;
        }
    }

    function calculateUpcomingSunday() {
        let today = new Date();
        let dayOfWeek = today.getDay(); 
        let daysUntilSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek;
        let targetSunday = new Date(today);
        targetSunday.setDate(today.getDate() + daysUntilSunday);
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.querySelectorAll('.targetSundayDate').forEach(el => {
            el.innerText = targetSunday.toLocaleDateString('en-ZA', options);
        });
    }

    async function fetchAndCompileLogistics() {
        try {
            const { data: records, error } = await churchDb
                .from('church_signups')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                diagnostic.className = "status-bad";
                diagnostic.innerHTML = "🚨 Database Error: " + error.message;
                return;
            }

            diagnostic.className = "status-good";
            diagnostic.innerHTML = "🟢 Cloud synchronization verified. Data is live.";
            document.getElementById('totalCount').innerText = records.length;

            const manifestContainer = document.getElementById('manifestContainer');
            const limboSectionContainer = document.getElementById('limboSectionContainer');
            manifestContainer.innerHTML = '';
            limboSectionContainer.innerHTML = '';

            if(records.length === 0) {
                manifestContainer.innerHTML = '<p style="text-align:center; padding: 20px; color:#94a3b8;">No passenger records active.</p>';
                return;
            }

            let globalLimboPassengers = [];

            // COMPILE INDEPENDENT ROUTE AREAS
            for (const [areaName, stopList] of Object.entries(REGIONAL_ROUTES)) {
                let areaRecords = records.filter(r => stopList.includes(r.pickup_stop));
                if (areaRecords.length === 0) continue; 

                let stopBuckets = {};
                stopList.forEach(stop => stopBuckets[stop] = []);
                areaRecords.forEach(p => {
                    if (stopBuckets[p.pickup_stop]) stopBuckets[p.pickup_stop].push(p);
                });

                let areaTaxis = [];
                let backlogStops = [];

                stopList.forEach(stop => {
                    let individualsAtStop = [...stopBuckets[stop]];
                    if (individualsAtStop.length === 0) return;

                    while (individualsAtStop.length >= TAXI_CAPACITY) {
                        let fullTaxi = { id: areaTaxis.length + 1, passengers: [] };
                        let fullTaxiBatch = individualsAtStop.splice(0, TAXI_CAPACITY);
                        fullTaxiBatch.forEach(p => fullTaxi.passengers.push(p));
                        areaTaxis.push(fullTaxi);
                    }

                    let remainingGroupSize = individualsAtStop.length;
                    if (remainingGroupSize === 0) return;

                    let targetTaxi = null;
                    for (let taxi of areaTaxis) {
                        let seatsLeft = TAXI_CAPACITY - taxi.passengers.length;
                        if (seatsLeft >= remainingGroupSize) {
                            targetTaxi = taxi;
                            break; 
                        }
                    }

                    if (targetTaxi) {
                        individualsAtStop.forEach(p => targetTaxi.passengers.push(p));
                    } else {
                        backlogStops.push(individualsAtStop);
                    }
                });

                while (backlogStops.length > 0) {
                    let testTaxiContent = [];
                    let elementsToExtract = [];

                    for (let i = 0; i < backlogStops.length; i++) {
                        let currentGroup = backlogStops[i];
                        if (testTaxiContent.length + currentGroup.length <= TAXI_CAPACITY) {
                            testTaxiContent.push(...currentGroup);
                            elementsToExtract.push(i);
                        }
                    }

                    if (testTaxiContent.length >= MIN_PASSENGER_FLOOR) {
                        let newTaxi = { id: areaTaxis.length + 1, passengers: testTaxiContent };
                        areaTaxis.push(newTaxi);
                        backlogStops = backlogStops.filter((_, idx) => !elementsToExtract.includes(idx));
                    } else {
                        backlogStops.forEach(group => {
                            globalLimboPassengers.push(...group);
                        });
                        break; 
                    }
                }

                // RENDER ACTIVE TAXI VEHICLES WITH CHRONOLOGICAL REROUTING LAYOUTS
                if (areaTaxis.length > 0) {
                    const areaHeaderDiv = document.createElement('div');
                    areaHeaderDiv.className = 'area-header';
                    areaHeaderDiv.innerText = `📍 ${areaName} Active Manifests`;
                    manifestContainer.appendChild(areaHeaderDiv);

                    areaTaxis.forEach(taxi => {
                        const vehicleDiv = document.createElement('div');
                        vehicleDiv.className = 'vehicle-block';

                        let countsByStop = {};
                        taxi.passengers.forEach(p => {
                            countsByStop[p.pickup_stop] = (countsByStop[p.pickup_stop] || 0) + 1;
                        });
                        
                        let routePlanStrings = [];
                        stopList.forEach(sName => {
                            if (countsByStop[sName]) routePlanStrings.push(`${sName} (${countsByStop[sName]} people)`);
                        });

                        // MODIFICATION: Re-ordered Columns inside Table Rows HTML Generation Loop
                        let tableRowsHtml = '';
                        let passengerIndexCounter = 1; // Counter initialized per taxi vehicle

                        stopList.forEach(sName => {
                            let stopPassengers = taxi.passengers.filter(p => p.pickup_stop === sName);
                            stopPassengers.forEach(r => {
                                tableRowsHtml += `
                                    <tr>
                                        <td><strong>${passengerIndexCounter++}.</strong></td>
                                        <td><span style="background:#eff6ff; color:#1e40af; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;">${r.pickup_stop}</span></td>
                                        <td><strong>${r.name}</strong></td>
                                        <td>${r.phone}</td>
                                        <td>${r.visitor_status}</td>
                                        <td>${r.structure}</td>
                                        <td><button class="delete-btn" onclick="deletePassenger(${r.id}, '${r.name}')">❌ Remove</button></td>
                                    </tr>
                                `;
                            });
                        });

                        vehicleDiv.innerHTML = `
                            <div class="vehicle-title">🚍 Vehicle #${taxi.id} — Total Loading: ${taxi.passengers.length}/${TAXI_CAPACITY} Seats Filled</div>
                            <div class="stop-summary-inline">
                                <strong>Driver Route Plan Order:</strong> ${routePlanStrings.join(' ➔ ')}
                            </div>
                            <div style="max-width: 100%; overflow-x: auto;">
                                <table>
                                    <thead>
                                        <tr>
                                            <th style="width: 40px;">#</th>
                                            <th>Stop Location</th>
                                            <th>Passenger Name</th>
                                            <th>Phone</th>
                                            <th>Classification</th>
                                            <th>Structure</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>${tableRowsHtml}</tbody>
                                </table>
                            </div>
                        `;
                        manifestContainer.appendChild(vehicleDiv);
                    });
                }
            }

            // PHASE 4: RENDER THE SECURED LIMBO BLOCK AT THE BOTTOM OF THE LAYOUT WINDOW
            if (globalLimboPassengers.length > 0) {
                const limboDiv = document.createElement('div');
                limboDiv.className = 'limbo-block';
                
                let limboRowsHtml = '';
                let limboIndexCounter = 1; // Counter initialized for the Limbo system list

                globalLimboPassengers.forEach(r => {
                    limboRowsHtml += `
                        <tr style="background: #fff1f2;">
                            <td style="color:#9f1239;"><strong>${limboIndexCounter++}.</strong></td>
                            <td><span style="background:#ffe4e6; color:#9f1239; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;">${r.pickup_stop}</span></td>
                            <td style="color:#9f1239;"><strong>${r.name}</strong></td>
                            <td style="color:#9f1239;">${r.phone}</td>
                            <td style="color:#9f1239;">${r.visitor_status}</td>
                            <td style="color:#9f1239;">${r.structure}</td>
                            <td><button class="delete-btn" onclick="deletePassenger(${r.id}, '${r.name}')">❌ Remove</button></td>
                        </tr>
                    `;
                });

                limboDiv.innerHTML = `
                    <h3 style="color:#9f1239; margin-bottom: 5px;">⚠️ Unassigned Passengers (${globalLimboPassengers.length} in Limbo)</h3>
                    <p style="font-size:0.85rem; margin-top:0; color:#475569;">
                        These stops are currently unassigned because their headcount cannot fit into open capacity slots, and their standalone numbers fall below the efficiency threshold required to operate an exclusive taxi route.
                    </p>
                    <div style="max-width: 100%; overflow-x: auto; background: white; border-radius:12px; border:1px solid #fecdd3; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 40px;">#</th>
                                    <th>Stop Location</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Classification</th>
                                    <th>Structure</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${limboRowsHtml}</tbody>
                        </table>
                    </div>
                `;
                limboSectionContainer.appendChild(limboDiv);
            }

        } catch(err) {
            alert("Exception parsing registers.");
            console.error(err);
        }
    }

    async function downloadExcelBackup() {
        try {
            const { data: records, error } = await churchDb
                .from('church_signups')
                .select('name, phone, visitor_status, structure, pickup_stop, created_at')
                .order('created_at', { ascending: true });

            if (error) {
                alert("Error pulling backup: " + error.message);
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,Full Name,Phone Number,Classification,Structure,Pickup Stop,Signup Date/Time\n";
            records.forEach(r => {
                let row = `"${r.name}","${r.phone}","${r.visitor_status}","${r.structure}","${r.pickup_stop}","${new Date(r.created_at).toLocaleString('en-ZA')}"`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Church_Transport_Master_Archive_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (err) {
            alert("Failed to generate report: " + err.message);
        }
    }

    async function deletePassenger(id, name) {
        let securityChallenge = prompt(`🔒 Security Clearance Required:\nEnter Admin Password to completely remove ${name} from the database:`);
        
        if (securityChallenge === null) return; 
        
        if (securityChallenge === ADMIN_PASSWORD) {
            if (confirm(`Are you absolutely sure you want to permanently delete ${name}? This action cannot be undone.`)) {
                const { error } = await churchDb.from('church_signups').delete().eq('id', id);
                if (error) {
                    alert("Deletion rejected by database: " + error.message);
                } else {
                    fetchAndCompileLogistics(); 
                }
            }
        } else {
            alert("❌ Access Denied: Incorrect Administrative Password.");
        }
    }

    initializeAdmin();
</script>
</body>
</html>
